<header class="header" id="header">
    <a draggable="false" class="wordmark-link" href="/">
        <img
            draggable="false"
            class="logomark"
            src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/logo-tristanvangarsse-bright-pink.svg"
            alt="Red logo"
        />
        <img
            draggable="false"
            class="wordmark"
            src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/wordmark-accent_v1.svg"
            alt="Tristan Van Garsse"
        />
    </a>

    <nav>
        <a draggable="false" href="#work-section">{{nav.work}}</a>
        <a draggable="false" href="#about-section">{{nav.about}}</a>
        <a draggable="false" href="#artifacts-section">{{nav.artifacts}}</a>
        <a draggable="false" href="#contact-section">{{nav.contact}}</a>
        <div class="language-switcher">
            <button
                type="button"
                class="language-toggle"
                aria-expanded="false"
                aria-label="{{langSwitcher.label}}"
            >
                <img
                    src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/globe-neutral-100.svg"
                    alt=""
                />
                <span class="language-current">{{langSwitcher.current}}</span>
            </button>

            <div class="language-menu">
                <a
                    draggable="false"
                    href="{{langSwitcher.option1.href}}"
                    hreflang="{{langSwitcher.option1.code}}"
                    lang="{{langSwitcher.option1.code}}"
                    onclick="localStorage.setItem('preferredLanguage', '{{langSwitcher.option1.code}}')"
                >
                    <img
                        src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/globe-neutral-100.svg"
                        alt=""
                    />
                    {{langSwitcher.option1.label}}
                </a>
                <a
                    draggable="false"
                    href="{{langSwitcher.option2.href}}"
                    hreflang="{{langSwitcher.option2.code}}"
                    lang="{{langSwitcher.option2.code}}"
                    onclick="localStorage.setItem('preferredLanguage', '{{langSwitcher.option2.code}}')"
                >
                    <img
                        src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/globe-neutral-100.svg"
                        alt=""
                    />
                    {{langSwitcher.option2.label}}
                </a>
            </div>
        </div>
    </nav>
</header>
