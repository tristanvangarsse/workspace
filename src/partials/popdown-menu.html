<div
    class="popdown-menu initial-scroll-visibility not-initialized popdown-move"
    id="popdown-menu"
>
    <a draggable="false" class="wordmark-link" href="#body-anchor">
        <img
            draggable="false"
            class="logomark"
            src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/logo-tristanvangarsse-bright-pink.svg"
            alt="Red logo"
        />
        <img
            draggable="false"
            class="wordmark"
            src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/wordmark-accent_v1.svg"
            alt="Tristan Van Garsse"
        />
    </a>
    <nav>
        <a draggable="false" href="#work-section">{{nav.work}}</a>
        <a draggable="false" href="#about-section">{{nav.about}}</a>
        <a draggable="false" href="#artifacts-section">{{nav.artifacts}}</a>
        <a draggable="false" href="#contact-section">{{nav.contact}}</a>
        <div class="language-switcher">
            <button
                type="button"
                class="language-toggle"
                aria-expanded="false"
                aria-label="{{langSwitcher.label}}"
            >
                <img
                    src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/globe-neutral-100.svg"
                    alt=""
                />
                <span class="language-current">{{langSwitcher.current}}</span>
            </button>

            <div class="language-menu">
                <a
                    draggable="false"
                    href="{{langSwitcher.option1.href}}"
                    hreflang="{{langSwitcher.option1.code}}"
                    lang="{{langSwitcher.option1.code}}"
                    onclick="localStorage.setItem('preferredLanguage', '{{langSwitcher.option1.code}}')"
                >
                    <img
                        src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/globe-neutral-100.svg"
                        alt=""
                    />
                    {{langSwitcher.option1.label}}
                </a>
                <a
                    draggable="false"
                    href="{{langSwitcher.option2.href}}"
                    hreflang="{{langSwitcher.option2.code}}"
                    lang="{{langSwitcher.option2.code}}"
                    onclick="localStorage.setItem('preferredLanguage', '{{langSwitcher.option2.code}}')"
                >
                    <img
                        src="https://file.garden/Z8RSCvtUnnZ9Xeo8/image/svg/globe-neutral-100.svg"
                        alt=""
                    />
                    {{langSwitcher.option2.label}}
                </a>
            </div>
        </div>
        <button id="menu-trigger" class="hamburger-menu">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <polyline
                    id="bread-bottom"
                    fill="none"
                    stroke="#000"
                    stroke-width="1.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    points="2 12, 16 12"
                >
                    <animate
                        id="bread-bottom-open"
                        attributeName="points"
                        keyTimes="0;0.5;1"
                        dur="0.24s"
                        begin="indefinite"
                        fill="freeze"
                        calcMode="spline"
                        keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
                        values="2 12, 16 12; 2 9, 16 9; 3.5 15, 15 3.5"
                    ></animate>
                    <animate
                        id="bread-bottom-close"
                        attributeName="points"
                        keyTimes="0;0.5;1"
                        dur="0.24s"
                        begin="indefinite"
                        fill="freeze"
                        calcMode="spline"
                        keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
                        values="3.5 15, 15 3.5; 2 9, 16 9; 2 12, 16 12"
                    ></animate>
                </polyline>
                <polyline
                    id="bread-top"
                    fill="none"
                    stroke="#000"
                    stroke-width="1.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    points="2 5, 16 5"
                >
                    <animate
                        id="bread-top-open"
                        attributeName="points"
                        keyTimes="0;0.5;1"
                        dur="0.24s"
                        begin="indefinite"
                        fill="freeze"
                        calcMode="spline"
                        keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
                        values="2 5, 16 5; 2 9, 16 9; 3.5 3.5, 15 15"
                    ></animate>
                    <animate
                        id="bread-top-close"
                        attributeName="points"
                        keyTimes="0;0.5;1"
                        dur="0.24s"
                        begin="indefinite"
                        fill="freeze"
                        calcMode="spline"
                        keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
                        values="3.5 3.5, 15 15; 2 9, 16 9; 2 5, 16 5"
                    ></animate>
                </polyline>
            </svg>
        </button>
    </nav>
</div>
